{% extends 'budget/base.html' %}
{% block header_extra %}{% endblock %}
{% block content %}
<div style="max-width:380px; margin:60px auto;">
    <div class="card" style="padding:32px;">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:28px; margin-bottom:8px;">📱</div>
            <div style="font-size:18px; font-weight:700;">Vérification OTP</div>
            <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">
                Entrez le code à 6 chiffres de votre application d'authentification
            </div>
        </div>
        {% if error %}
        <div style="background:var(--danger-bg); color:var(--danger); padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:16px;">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label>Code OTP</label>
                <input type="text" name="token" placeholder="000000" maxlength="6"
                    style="text-align:center; font-size:24px; letter-spacing:8px;"
                    inputmode="numeric" pattern="[0-9]*" autofocus />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
                Vérifier
            </button>
        </form>
        <div style="text-align:center; margin-top:16px;">
            <a href="/logout/" style="font-size:12px; color:var(--text-muted);">← Se déconnecter</a>
        </div>
    </div>
</div>
{% endblock %}
