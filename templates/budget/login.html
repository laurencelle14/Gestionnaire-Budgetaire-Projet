{% extends 'budget/base.html' %}
{% block header_extra %}{% endblock %}
{% block content %}
<div style="max-width:380px; margin:60px auto;">
    <div class="card" style="padding:32px;">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:28px; margin-bottom:8px;">🔐</div>
            <div style="font-size:18px; font-weight:700;">Connexion</div>
            <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">Accès administrateur</div>
        </div>
        {% if error %}
        <div style="background:var(--danger-bg); color:var(--danger); padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:16px;">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" autofocus autocomplete="username" />
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <div style="position:relative;">
                    <input type="password" name="password" id="inp-password" autocomplete="current-password"
                    style="padding-right:40px;" />
                    <button type="button" onclick="togglePassword()"
                        style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-muted); padding:0; line-height:1; display:flex; align-items:center;"
                        id="btn-toggle-pw">
                        <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                            <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                            <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                           <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                           <line x1="2" y1="2" x2="22" y2="22"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
                Se connecter
            </button>
        </form>
    </div>
</div>
<script>
function togglePassword() {
    const inp = document.getElementById('inp-password');
    const eyeOn = document.getElementById('icon-eye');
    const eyeOff = document.getElementById('icon-eye-off');
    if (inp.type === 'password') {
        inp.type = 'text';
        eyeOn.style.display = 'none';
        eyeOff.style.display = 'block';
    } else {
        inp.type = 'password';
        eyeOn.style.display = 'block';
        eyeOff.style.display = 'none';
    }
}
</script>
{% endblock %}
