{% extends 'budget/base.html' %}
{% block header_extra %}{% endblock %}
{% block content %}
<div style="max-width:380px; margin:60px auto;">
    <div class="card" style="padding:32px;">
        <div style="text-align:center; margin-bottom:28px;">
            <div style="font-size:28px; margin-bottom:8px;">🔐</div>
            <div style="font-size:18px; font-weight:700;">Connexion</div>
            <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">Accès administrateur</div>
        </div>
        {% if error %}
        <div style="background:var(--danger-bg); color:var(--danger); padding:10px 14px; border-radius:var(--radius); font-size:13px; margin-bottom:16px;">
            ⚠️ {{ error }}
        </div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" autofocus autocomplete="username" />
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <div style="position:relative;">
                    <input type="password" name="password" id="inp-password" autocomplete="current-password"
                    style="padding-right:40px;" />
                    <button type="button" onclick="togglePassword()"
                       style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:16px; padding:0; line-height:1;"
                       id="btn-toggle-pw">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
                Se connecter
            </button>
        </form>
    </div>
</div>
<script>
function togglePassword() {
    const inp = document.getElementById('inp-password');
    const btn = document.getElementById('btn-toggle-pw');
    if (inp.type === 'password') {
        inp.type = 'text';
        btn.textContent = '🙈';
    } else {
        inp.type = 'password';
        btn.textContent = '👁️';
    }
}
</script>
{% endblock %}
